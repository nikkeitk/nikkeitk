# Hugo configuration file
title: NikkeiTK
buildFuture: true
languageCode: pt-br
defaultContentLanguage: pt-br

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Sobre
      pageRef: /about
      weight: 1
    - name: Buscar
      weight: 2
      params:
        type: search
    - name: GitHub
      weight: 3
      url: "https://github.com/nikkeitk"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: false
    displayThemeToggle: false

  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
